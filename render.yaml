services:
  - type: web
    name: financeiq
    runtime: node
    buildCommand: >
      npm install --no-audit --no-fund &&
      cd client &&
      npm install --no-audit --no-fund &&
      npm run build &&
      cd .. &&
      test -d client/dist &&
      echo "Frontend build succeeded"
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production