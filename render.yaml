services:
  - type: web
    name: financeiq
    runtime: node
    buildCommand: npm install --no-audit --no-fund && npm run build --if-present && ls -la client/dist
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
